# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-db"
unmaintained = "workspace"
yanked = "warn"
ignore = [
    # paste is a compile-time proc-macro only (no runtime code). 1.0.15 is the
    # latest version; fix must come from upstream (tokenizers, parquet).
    "RUSTSEC-2024-0436",
    # bincode 2.0.1 is unmaintained but deeply embedded in grafeo-engine and
    # grafeo-common (serialization layer). Fix must come from upstream engine.
    "RUSTSEC-2025-0141",
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
